<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML to JSON Converter</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .converter-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--spacing-lg);
        }

        .converter-title {
            text-align: center;
            font-size: var(--font-size-2xl);
            font-weight: var(--font-weight-bold);
            margin-bottom: var(--spacing-xl);
            color: var(--category-title-color);
        }

        .windows-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
        }

        .window {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
        }

        .window-label {
            font-size: var(--font-size-md);
            font-weight: var(--font-weight-semibold);
            color: var(--category-title-color);
        }

        .window-textarea {
            width: 100%;
            height: 300px;
            padding: var(--spacing-md);
            font-size: var(--font-size-sm);
            font-family: 'Courier New', monospace;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            background-color: var(--container-bg);
            color: var(--text-color);
            resize: vertical;
            transition: all var(--transition-normal);
        }

        .window-textarea:focus {
            outline: none;
            border-color: var(--border-focus-color);
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
        }

        .window-textarea:disabled {
            background-color: var(--alternative-bg);
            cursor: not-allowed;
            opacity: 0.8;
        }

        .result-block {
            background: var(--container-bg);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            box-shadow: var(--shadow-md);
        }

        .result-label {
            font-size: var(--font-size-md);
            font-weight: var(--font-weight-semibold);
            color: var(--category-title-color);
            margin-bottom: var(--spacing-md);
        }

        .result-content {
            background: var(--alternative-bg);
            padding: var(--spacing-md);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            min-height: 150px;
        }

        .result-content:empty::before {
            content: "Здесь появится результат...";
            color: var(--text-color);
            opacity: 0.5;
        }

        .control-buttons {
            display: flex;
            gap: var(--spacing-sm);
            margin-top: var(--spacing-md);
        }

        .control-button {
            flex: 1;
            padding: var(--spacing-md) var(--spacing-lg);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            background-color: var(--container-bg);
            color: var(--text-color);
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-semibold);
            cursor: pointer;
            transition: all var(--transition-normal);
        }

        .control-button:hover {
            background-color: var(--alternative-bg);
            border-color: var(--border-hover-color);
            transform: translateY(-1px);
        }

        .CodeMirror {
            width: 100%;
            height: 300px;
            font-size: var(--font-size-sm);
            font-family: 'Courier New', monospace;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            background-color: var(--container-bg);
            transition: all var(--transition-normal);
        }

        .CodeMirror-focused {
            outline: none;
            border-color: var(--border-focus-color);
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
        }

        /* Заголовок окна с кнопкой форматирования */
        .window-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .format-btn {
            padding: 4px 10px;
            font-size: 12px;
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-color);
            cursor: pointer;
            transition: all var(--transition-normal);
        }

        .format-btn:hover {
            background-color: var(--alternative-bg);
            border-color: var(--border-hover-color);
        }

        @media (max-width: 768px) {
            .windows-container {
                grid-template-columns: 1fr;
            }

            .window-textarea {
                height: 250px;
            }

            .CodeMirror {
                height: 250px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/monokai.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.9/beautify-html.min.js"></script>
</head>

<body>
    <div class="converter-section">
        <div style="display: flex; justify-content: flex-end; margin-bottom: 10px;">
            <button id="themeToggle" class="control-button" style="flex: none; width: auto;">🌓 Сменить тему</button>
        </div>
        <h1 class="converter-title">🔄 HTML to JSON Converter</h1>

        <div class="windows-container">
            <!-- Левое окно - редактируемое -->
            <div class="window">
                <div class="window-header">
                    <label class="window-label">📝 HTML Код</label>
                    <button class="format-btn" id="formatButton" title="Форматировать код">✨ Автоформат</button>
                </div>
                <textarea id="htmlInput" class="window-textarea" placeholder="Вставьте HTML код здесь..."></textarea>
            </div>

            <!-- Правое окно - только для чтения -->
            <div class="window">
                <label class="window-label">📋 JSON-совместимый формат</label>
                <textarea id="jsonOutput" class="window-textarea" disabled
                    placeholder="Результат отобразится здесь..."></textarea>
            </div>
        </div>

        <!-- Блок с результирующим HTML -->
        <div class="result-block">
            <div class="result-label">👁 Предпросмотр результата</div>
            <div class="result-content" id="resultPreview"></div>
            <div class="control-buttons">
                <button class="control-button" id="clearButton">🗑 Очистить</button>
                <button class="control-button" id="copyButton">📋 Копировать JSON</button>
            </div>
        </div>
    </div>

    <script>
        // Элементы DOM
        const htmlInput = document.getElementById('htmlInput');
        const jsonOutput = document.getElementById('jsonOutput');
        const resultPreview = document.getElementById('resultPreview');
        const clearButton = document.getElementById('clearButton');
        const copyButton = document.getElementById('copyButton');
        const formatButton = document.getElementById('formatButton');
        const themeToggle = document.getElementById('themeToggle');

        // Инициализация CodeMirror
        const editor = CodeMirror.fromTextArea(htmlInput, {
            mode: 'htmlmixed',
            lineNumbers: true,
            theme: 'default', // Можно изменить на 'monokai' для темной темы
            lineWrapping: true,
            tabSize: 4,
            viewportMargin: Infinity
        });

        /**
         * Функция автоматического форматирования HTML
         */
        function formatHtmlCode() {
            const unformatted = editor.getValue();
            if (!unformatted.trim()) return;

            // Форматируем с помощью js-beautify
            const formatted = html_beautify(unformatted, {
                indent_size: 4,
                wrap_line_length: 0,
                preserve_newlines: true,
                max_preserve_newlines: 1,
                end_with_newline: true
            });

            if (formatted !== unformatted) {
                // Обновляем значение без потери истории Undo
                const cursor = editor.getCursor();
                editor.setValue(formatted);
                editor.setCursor(cursor);
            }
        }

        /**
         * Конвертирует HTML в JSON-совместимый формат
         * Убирает переносы, использует одинарные кавычки внутри HTML
         */
        function convertHtmlToJsonFormat(html) {
            if (!html.trim()) {
                return '';
            }

            // Заменяем двойные кавычки на одинарные в атрибутах
            let converted = html.replace(/"/g, "'");

            // Убираем все переносы строк, табуляции и лишние пробелы
            converted = converted
                .replace(/\n/g, ' ')           // Заменяем переносы на пробел
                .replace(/\r/g, '')            // Убираем возврат каретки
                .replace(/\t/g, ' ')           // Заменяем табуляции на пробел
                .replace(/\s+/g, ' ')          // Заменяем множественные пробелы на один
                .trim();                       // Убираем пробелы в начале и конце

            return converted;
        }

        /**
         * Обновляет все поля при вводе в левое окно
         */
        function handleInput() {
            const htmlCode = htmlInput.value;

            // Конвертируем в JSON-совместимый формат
            const jsonFormat = convertHtmlToJsonFormat(htmlCode);
            jsonOutput.value = jsonFormat;

            // Обновляем предпросмотр
            updatePreview(htmlCode);
        }

        /**
         * Обновляет предпросмотр результирующего HTML
         */
        function updatePreview(htmlCode) {
            try {
                resultPreview.innerHTML = htmlCode || '';
            } catch (error) {
                resultPreview.innerHTML = `<span style="color: var(--limit-exceeded);">Ошибка в HTML коде: ${error.message}</span>`;
            }
        }

        /**
         * Очищает все поля
         */
        function clearAll() {
            htmlInput.value = '';
            jsonOutput.value = '';
            resultPreview.innerHTML = '';
        }

        /**
         * Копирует JSON-совместимый код в буфер обмена
         */
        function copyToClipboard() {
            if (!jsonOutput.value) {
                alert('Нет текста для копирования');
                return;
            }

            navigator.clipboard.writeText(jsonOutput.value).then(() => {
                // Показываем обратную связь
                const originalText = copyButton.textContent;
                copyButton.textContent = '✓ Скопировано!';
                setTimeout(() => {
                    copyButton.textContent = originalText;
                }, 2000);
            }).catch(() => {
                alert('Ошибка при копировании');
            });
        }

        /**
 * Переключает тему интерфейса и CodeMirror
 */
        function toggleTheme() {
            const html = document.documentElement;
            html.setAttribute("data-theme", html.getAttribute("data-theme") === "dark" ? "light" : "dark");

            // Переключаем тему в CodeMirror
            // 'monokai' для темной, 'default' для светлой
            editor.setOption('theme', html.getAttribute("data-theme") === "dark" ? 'monokai' : 'default');

            // Сохраняем выбор пользователя
            localStorage.setItem('theme', html.getAttribute("data-theme") === "dark" ? 'dark' : 'light');
        }

        // Слушаем изменения в редакторе CodeMirror вместо textarea
        editor.on('change', () => {
            const htmlCode = editor.getValue();
            const jsonFormat = convertHtmlToJsonFormat(htmlCode);
            jsonOutput.value = jsonFormat;
            updatePreview(htmlCode);
        });

        // Автоматическое форматирование при вставке текста (Paste)
        editor.on('paste', () => {
            // Небольшая задержка, чтобы текст успел вставиться
            setTimeout(formatHtmlCode, 50);
        });

        // Обработчики событий
        clearButton.addEventListener('click', clearAll);
        copyButton.addEventListener('click', copyToClipboard);
        formatButton.addEventListener('click', formatHtmlCode);
        themeToggle.addEventListener('click', toggleTheme);

        window.addEventListener('DOMContentLoaded', () => {
            const html = document.documentElement;
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                html.setAttribute("data-theme", "dark");
                editor.setOption('theme', 'monokai');
            }
        });

        // Инициализация
        console.log('HTML to JSON Converter initialized ✓');
    </script>
</body>

</html>
